paths:
  data_root: ./data
  uploads: ./data/uploads
  frames: ./data/frames
  audio: ./data/audio
  whisper: ./data/whisper
  out: ./data/out
  sqlite_path: ./ad_classifier.db
  qdrant_path: ./qdrant_db

ingest:
  ffmpeg_path: ffmpeg
  ffprobe_path: ffprobe
  frame_interval_ms: 500
  audio_sample_rate: 16000

whisper:
  # ── Backend ──
  #   whisper_cpp   (default) — uses whisper-cli.exe, best GPU support on AMD via Vulkan
  #   faster-whisper          — Python native, uses CTranslate2, good for CPU or NVIDIA CUDA
  #   mock                    — returns empty transcript (for testing without a model)
  backend: whisper_cpp
  # ── Model ──
  #   tiny.en       (39 MB, fastest, worst accuracy — "Jeep" heard as "cheap")
  #   large-v3-turbo (~1.6 GB q5_0 or 3.1 GB full, best accuracy, recommended)
  model: large-v3-turbo
  compute_type: int8              # faster-whisper only
  language: null                  # null = auto-detect
  whisper_cpp:
    # Windows path: download a ggml model from https://huggingface.co/ggerganov/whisper.cpp
    command: ./tools/whisper.cpp/whisper-cli.exe
    model_path: ./models/whisper/ggml-large-v3-turbo.bin
    use_gpu: true
    device: 0
    threads: 8
    extra_args: []

dedup:
  skip_on_exact: true
  skip_on_near_duplicate: false
  phash_distance_threshold: 8
  post_ocr:
    # Cheap duplicate classifier after OCR and before VLM. It catches
    # re-encoded copies whose file hash changed while preserving near-identical
    # campaign variants with different offer/product text.
    enabled: true
    skip_on_exact: true
    candidate_phash_distance: 16
    per_frame_phash_distance: 6
    duration_tolerance_ms: 1500
    min_frame_match_ratio: 0.90
    min_text_similarity: 0.90
    min_transcript_similarity: 0.88
    min_signature_similarity: 0.82
    min_text_chars: 80
    max_candidates: 25

ocr:
  # Raw OCR engine. Only local PaddleOCR is supported here for now.
  enabled: true
  backend: paddleocr
  device: cpu
  lang: en

paddlevl:
  enabled: false
  command: "paddlex --pipeline PaddleOCR-VL-native.yaml --input {image_path} --output {output_dir}"
  timeout_s: 60
  gating:
    force_all: false
    mean_confidence_threshold: 0.70
    min_item_confidence_threshold: 0.50
    dense_text_char_threshold: 500
    short_fragment_count_threshold: 20
    short_fragment_max_len: 3

glm_ocr:
  # Optional document/OCR-VL pass for text-heavy frames. Output is stored
  # separately as ocr_items.engine = "glm_ocr" and included in search text
  # when include_in_search is true. It is not used as grounded OCR evidence
  # for rules/marketing unless you explicitly wire that downstream. Keep false
  # in the template so fresh installs do not require a GLM-OCR endpoint; enable
  # for normal local ingestion when an OpenAI-compatible GLM-OCR engine is
  # listening on port 5050.
  enabled: false
  mode: local                 # local | remote
  prompt: "Transcribe all visible text exactly. Preserve line breaks and reading order. Do not summarize or infer."
  image_max_dim: 1024
  include_in_search: true
  include_in_vlm_bundle: false # keep false for finance/legal fine print unless reviewed
  run_on_text_frames: true
  min_ocr_chars: 100
  run_when_ocr_disabled: true
  max_frames_per_ad: 12
  local:
    endpoint: "http://127.0.0.1:5050/v1"
    model: "glm-ocr"
    api_key_env: null
    timeout_s: 120
    max_retries: 1
    retry_delay_s: 1
    temperature: 0
    max_tokens: 2048
    stream: true
  remote:
    endpoint: "https://your-openai-compatible-glm-ocr.example/v1"
    model: "glm-ocr"
    api_key_env: "GLM_OCR_API_KEY"
    timeout_s: 120
    max_retries: 1
    retry_delay_s: 1
    temperature: 0
    max_tokens: 2048
    stream: true
  gating:
    force_all: false
    mean_confidence_threshold: 0.70
    min_item_confidence_threshold: 0.50
    dense_text_char_threshold: 500
    short_fragment_count_threshold: 20
    short_fragment_max_len: 3

rules:
  rules_path: null                # null = built-in ad_classifier/pipeline/rules/default_rules.yaml
  alignment_window_ms: 1500

vlm:
  # mode: local | remote — selects which endpoint preset is active.
  #   "local"  → vlm.local is used (OpenAI-compatible engine on this machine)
  #   "remote" → vlm.remote is used (cloud / hosted endpoint)
  # The agent inherits the active preset when agent.inherit_vlm is true.
  # Flip the flag to switch all VLM calls + agent between local and remote.
  mode: local
  max_frames_in_bundle: 12
  image_max_dim: 512       # max pixel dimension for VLM frames; bump to 768 for text-heavy ads
  enable_ocr_cleanup_pass: true       # text-only VLM pass to clean garbled OCR before classification
  enable_self_correction: true        # lightweight text-only consistency check after VLM output
  enable_post_validation: true        # deterministic validation of prices, offers, brands
  enable_visual_verify: false         # second VLM pass: verify brand/logo claims against frames
  complexity:
    # Auto-raise generation budgets for OCR-heavy ads. This catches dense
    # end-card/fine-print creatives that otherwise hit finish_reason=length.
    enabled: true
    ocr_item_threshold: 120
    ocr_char_threshold: 1400
    max_frame_ocr_chars_threshold: 180
    transcript_char_threshold: 1200
    kept_frame_threshold: 24
    cleanup_max_tokens: 4096
    verifier_max_tokens: 8192
    self_correction_max_tokens: 4096
  local:
    endpoint: "http://127.0.0.1:1234/v1"
    model: "Qwen3.6-27B-Q4_K_M"      # vision-capable model for multimodal VLM analysis
    api_key_env: null                 # set to env var name if the engine uses auth
    timeout_s: 600
    max_retries: 2
    retry_delay_s: 2
    temperature: 0.1
    max_tokens: 8192
    enable_thinking: false
    # json_object is safer for small/quantized local models that may not
    # support structured output schemas.
    response_format: json_object
    stream: true
  remote:
    endpoint: "https://api.openai.com/v1"
    model: "gpt-4o-mini"
    api_key_env: "OPENAI_API_KEY"
    timeout_s: 120
    max_retries: 2
    retry_delay_s: 2
    temperature: 0.3
    max_tokens: 4096
    enable_thinking: false
    # json_schema forces the model to emit output that validates against
    # the Pydantic schema — more accurate for capable remote/VL models.
    response_format: json_schema
    stream: true

text_embedder:
  model: sentence-transformers/all-MiniLM-L6-v2
  device: cpu
  batch_size: 32
  dim: 384

image_embedder:
  # enabled: true requires torch + transformers (SigLIP 2).
  # Set to false to skip visual embeddings — useful for testing or when
  # torch is not installed. Text embeddings also require torch when using
  # sentence-transformers; use mock embeddings for no-torch test runs.
  enabled: true
  model: google/siglip2-base-patch16-224
  device: cpu
  batch_size: 8
  dim: 768

vector_store:
  backend: sqlite-vec
  text_dim: 384
  visual_dim: 768

campaigns:
  discover:
    lookback_days: 90
    min_cluster_size: 3
    min_mean_similarity: 0.75
    use_campaign_suggestions: true
    min_campaign_signal_confidence: 0.80
    clusterer: hdbscan            # hdbscan | agglomerative
    name_template: "{brand} {month} {year}"

api:
  host: 127.0.0.1
  port: 8000
  cors_origins:
    - http://localhost:5173
  upload:
    max_bytes: 209715200          # 200 MB
    allowed_mime:
      - video/mp4
      - video/quicktime
      - video/webm

worker:
  poll_interval_ms: 1000
  concurrency: 1

agent:
  # inherit_vlm: true (default) — agent automatically follows vlm.mode.
  # When vlm.mode is "remote" the agent uses the remote endpoint; when
  # "local" it uses the local one.  Override agent.endpoint fields below
  # to pin the agent to a specific backend regardless of vlm.mode.
  inherit_vlm: true
  endpoint: {}
  max_iterations: 8
  list_max_rows: 50
  sql_readonly_max_rows: 50
  sql_statement_timeout_s: 5
  temperature: 0.1
  max_tokens: 1024

search:
  # Minimum cosine-similarity threshold for vector search results.
  # Results below these scores are dropped before ranking/filtering.
  # Lower values = more recall, higher values = more precision.
  # Set to 0 to disable relevance filtering entirely.
  # SigLIP2 cross-modal (text→image) cosine similarities cluster close
  # to zero on local video frames, and ad-level visual vectors are
  # mean-pooled from keyframes (diluting the signal), so the visual
  # threshold must be much more permissive than text-vector search.
  # For visual mode, the filter also checks
  # per-frame similarity (picking the best keyframe), not just the
  # ad-level vector, so an ad survives if ANY keyframe clears the bar.
  text_min_score: 0.20          # text-vector (all-MiniLM-L6-v2) and hybrid mode
  visual_min_score: 0.03        # visual-only / exploratory SigLIP2 queries
  visual_hybrid_min_score: 0.08 # visual-only additions when keyword hits exist
