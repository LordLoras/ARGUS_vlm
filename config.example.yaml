# ARGUS runtime configuration.
#
# Copy this file to config.yaml and edit config.yaml for your machine.
# Choices are documented inline so setup does not require jumping between docs.

paths:
  # Local artifact roots. Relative paths resolve from the repo/config location.
  # Move data_root/sqlite_path to a larger drive if you ingest many videos.
  data_root: ./data
  uploads: ./data/uploads
  frames: ./data/frames
  audio: ./data/audio
  whisper: ./data/whisper
  out: ./data/out
  sqlite_path: ./ad_classifier.db
  qdrant_path: ./qdrant_db

ingest:
  # ffmpeg/ffprobe can be command names on PATH or absolute .exe paths.
  ffmpeg_path: ffmpeg
  ffprobe_path: ffprobe
  # Frame cadence for pipeline evidence. Lower = more frames/slower/bigger DB.
  frame_interval_ms: 500
  # Whisper expects mono 16 kHz audio; only change for a custom transcriber.
  audio_sample_rate: 16000

whisper:
  # ── Backend ──
  #   whisper_cpp   (default) — uses whisper-cli.exe, best GPU support on AMD via Vulkan
  #   faster-whisper          — Python native, uses CTranslate2, good for CPU or NVIDIA CUDA
  #   mock                    — returns empty transcript (for testing without a model)
  backend: whisper_cpp
  # ── Model ──
  #   tiny.en       (39 MB, fastest, worst accuracy — "Jeep" heard as "cheap")
  #   large-v3-turbo (~1.6 GB q5_0 or 3.1 GB full, best accuracy, recommended)
  model: large-v3-turbo
  compute_type: int8              # faster-whisper only
  language: null                  # null = auto-detect
  whisper_cpp:
    # Windows path: download a ggml model from https://huggingface.co/ggerganov/whisper.cpp
    command: ./tools/whisper.cpp/whisper-cli.exe
    model_path: ./models/whisper/ggml-large-v3-turbo.bin
    use_gpu: true
    device: 0
    threads: 8
    extra_args: []

dedup:
  # Exact duplicate = same source file bytes / SHA256. Usually safe to skip.
  skip_on_exact: true
  # Near duplicate = mean pHash before OCR. Keep false if variants differ by
  # only a few offer/product frames and you still want them processed separately.
  skip_on_near_duplicate: false
  # Hamming distance for pre-OCR pHash; lower = stricter, higher = more tolerant.
  phash_distance_threshold: 8
  post_ocr:
    # Cheap duplicate classifier after OCR and before VLM. It catches
    # re-encoded copies whose file hash changed while preserving near-identical
    # campaign variants with different offer/product text.
    enabled: true
    skip_on_exact: true
    candidate_phash_distance: 16
    per_frame_phash_distance: 6
    duration_tolerance_ms: 1500
    min_frame_match_ratio: 0.90
    min_text_similarity: 0.90
    min_transcript_similarity: 0.88
    min_signature_similarity: 0.82
    min_text_chars: 80
    max_candidates: 25

ocr:
  # Raw OCR engine. Only local PaddleOCR is supported here for now.
  enabled: true
  # Choices: paddleocr
  backend: paddleocr
  # Choices depend on your Paddle install. Use cpu by default; gpu/cuda only
  # if your local Paddle build supports it.
  device: cpu
  # Paddle language code. en is the tested default.
  lang: en

paddlevl:
  # Legacy local document-OCR path. Prefer glm_ocr for OpenAI-compatible OCR-VL.
  enabled: false
  command: "paddlex --pipeline PaddleOCR-VL-native.yaml --input {image_path} --output {output_dir}"
  timeout_s: 60
  gating:
    force_all: false
    mean_confidence_threshold: 0.70
    min_item_confidence_threshold: 0.50
    dense_text_char_threshold: 500
    short_fragment_count_threshold: 20
    short_fragment_max_len: 3

glm_ocr:
  # Optional document/OCR-VL pass for text-heavy frames. Output is stored
  # separately as ocr_items.engine = "glm_ocr" and included in search text
  # when include_in_search is true. It is not used as grounded OCR evidence
  # for rules/marketing unless you explicitly wire that downstream. Keep false
  # in the template so fresh installs do not require a GLM-OCR endpoint; enable
  # for normal local ingestion when an OpenAI-compatible GLM-OCR engine is
  # listening on port 5050.
  enabled: false
  # Choices: local | remote. The selected preset below is copied to
  # glm_ocr.endpoint at runtime.
  mode: local                 # local | remote
  prompt: "Transcribe all visible text exactly. Preserve line breaks and reading order. Do not summarize or infer."
  image_max_dim: 1024
  # include_in_search: add GLM-OCR text to keyword/vector text search.
  include_in_search: true
  # include_in_vlm_bundle: feed GLM-OCR text to the classifier. Keep false
  # unless you trust the OCR-VL output for fine print/legal text.
  include_in_vlm_bundle: false # keep false for finance/legal fine print unless reviewed
  # run_on_text_frames: allow automatic gated calls when PaddleOCR sees enough text.
  run_on_text_frames: true
  # min_ocr_chars: frame must have this many raw OCR chars before gated GLM-OCR.
  min_ocr_chars: 100
  # run_when_ocr_disabled: still call GLM-OCR if PaddleOCR is disabled.
  run_when_ocr_disabled: true
  # max_frames_per_ad: cap cost/latency per ad even when many frames are text-heavy.
  max_frames_per_ad: 12
  local:
    endpoint: "http://127.0.0.1:5050/v1"
    model: "glm-ocr"
    api_key_env: null
    timeout_s: 120
    max_retries: 1
    retry_delay_s: 1
    temperature: 0
    max_tokens: 2048
    stream: true
  remote:
    endpoint: "https://your-openai-compatible-glm-ocr.example/v1"
    model: "glm-ocr"
    api_key_env: "GLM_OCR_API_KEY"
    timeout_s: 120
    max_retries: 1
    retry_delay_s: 1
    temperature: 0
    max_tokens: 2048
    stream: true
  gating:
    # force_all: true calls GLM-OCR on every kept frame up to max_frames_per_ad.
    # Use only for diagnostics; normal mode should stay false.
    force_all: false
    # Thresholds below decide what "hard frame" means. Higher dense/fragment
    # thresholds call GLM-OCR less often; higher confidence thresholds call it
    # more often because more frames count as low-confidence.
    mean_confidence_threshold: 0.70
    min_item_confidence_threshold: 0.50
    dense_text_char_threshold: 500
    short_fragment_count_threshold: 20
    short_fragment_max_len: 3

rules:
  # null = built-in ad_classifier/pipeline/rules/default_rules.yaml.
  # Set to a YAML path to use project/customer-specific deterministic rules.
  rules_path: null                # null = built-in ad_classifier/pipeline/rules/default_rules.yaml
  # Transcript segments within this window are attached to nearby frames.
  alignment_window_ms: 1500

vlm:
  # mode: local | remote | frontier — selects which endpoint preset is active.
  #   "local"  → vlm.local is used (OpenAI-compatible engine on this machine)
  #   "remote" → vlm.remote is used (cloud / hosted endpoint)
  #   "frontier" → vlm.frontier is used (OpenRouter/frontier-model route)
  # The agent can inherit the active preset or pin itself to local/remote/frontier
  # with agent.inherit_vlm_mode.
  mode: local
  # auto uses frontier_strict for Frontier routing and standard elsewhere.
  # Use frontier_strict explicitly when a strong remote/frontier model should
  # behave as a compact evidence-only extractor.
  prompt_profile: auto            # auto | standard | frontier_strict
  # Max selected frames in the classifier evidence bundle. More frames improve
  # recall but increase latency/token pressure.
  max_frames_in_bundle: 12
  image_max_dim: 512       # max pixel dimension for VLM frames; bump to 768 for text-heavy ads
  # Reliability passes. Disable only when debugging latency or endpoint issues.
  enable_ocr_cleanup_pass: true       # text-only VLM pass to clean garbled OCR before classification
  enable_self_correction: true        # lightweight text-only consistency check after VLM output
  enable_post_validation: true        # deterministic validation of prices, offers, brands
  enable_visual_verify: false         # second VLM pass: verify brand/logo claims against frames
  complexity:
    # Auto-raise generation budgets for OCR-heavy ads. This catches dense
    # end-card/fine-print creatives that otherwise hit finish_reason=length.
    enabled: true
    ocr_item_threshold: 120
    ocr_char_threshold: 1400
    max_frame_ocr_chars_threshold: 180
    transcript_char_threshold: 1200
    kept_frame_threshold: 24
    cleanup_max_tokens: 4096
    verifier_max_tokens: 8192
    self_correction_max_tokens: 4096
  local:
    # OpenAI-compatible base URL ending in /v1.
    endpoint: "http://127.0.0.1:1234/v1"
    model: "Qwen3.6-27B-Q4_K_M"      # vision-capable model for multimodal VLM analysis
    api_key_env: null                 # set to env var name if the engine uses auth
    timeout_s: 600
    max_retries: 2
    retry_delay_s: 2
    temperature: 0.1
    max_tokens: 8192
    # enable_thinking: true only for endpoints/models that support a thinking
    # mode and still return valid JSON.
    enable_thinking: false
    # json_object is safer for small/quantized local models that may not
    # support structured output schemas.
    response_format: json_object
    stream: true
  remote:
    # Any hosted OpenAI-compatible endpoint. Set api_key_env to the environment
    # variable that holds the key; do not put secrets directly in config.yaml.
    endpoint: "https://api.openai.com/v1"
    model: "gpt-4o-mini"
    api_key_env: "OPENAI_API_KEY"
    timeout_s: 120
    max_retries: 2
    retry_delay_s: 2
    temperature: 0.3
    max_tokens: 8192
    enable_thinking: false
    # json_schema forces the model to emit output that validates against
    # the Pydantic schema — more accurate for capable remote/VL models.
    response_format: json_schema
    stream: true
  frontier:
    # OpenRouter-compatible frontier model route. Put the actual key in
    # .env.local as OPENROUTER_API_KEY or add it through the Settings UI.
    endpoint: "https://openrouter.ai/api/v1"
    model: "openrouter/auto"
    api_key_env: "OPENROUTER_API_KEY"
    timeout_s: 180
    max_retries: 2
    retry_delay_s: 2
    temperature: 0.2
    max_tokens: 8192
    enable_thinking: false
    response_format: json_schema
    stream: true

text_embedder:
  # Text vectors for semantic search. Keep dim aligned with vector_store.text_dim.
  model: sentence-transformers/all-MiniLM-L6-v2
  # Choices commonly used by torch stacks: cpu or cuda. Use cpu until the local
  # torch/GPU install is verified.
  device: cpu
  batch_size: 32
  dim: 384

image_embedder:
  # enabled: true requires torch + transformers (SigLIP 2).
  # Set to false to skip visual embeddings — useful for testing or when
  # torch is not installed. Text embeddings also require torch when using
  # sentence-transformers; use mock embeddings for no-torch test runs.
  enabled: true
  model: google/siglip2-base-patch16-224
  # Choices commonly used by torch stacks: cpu or cuda. For AMD ROCm builds,
  # torch still usually exposes the backend through cuda.
  device: cpu
  batch_size: 8
  dim: 768

vector_store:
  # Choices: sqlite-vec. Qdrant path exists for future backend work, but the
  # current API/worker path expects sqlite-vec.
  backend: sqlite-vec
  text_dim: 384
  visual_dim: 768

campaigns:
  discover:
    # Auto-discovery only proposes campaigns; user-curated assignments remain editable.
    lookback_days: 90
    # min_cluster_size: fewer ads = more proposals/noise; more ads = stricter.
    min_cluster_size: 3
    # Similarity floor for auto-cluster cohesion. Higher = fewer/tighter campaigns.
    min_mean_similarity: 0.75
    use_campaign_suggestions: true
    min_campaign_signal_confidence: 0.80
    # Choices: hdbscan | agglomerative. hdbscan finds variable-sized clusters;
    # agglomerative is deterministic and easier to reason about on small sets.
    clusterer: hdbscan            # hdbscan | agglomerative
    name_template: "{brand} {month} {year}"

brand_profiles:
  # Explicit user-action enrichment for bigger brands/advertisers. This is not
  # part of ingest and never overwrites ad-extracted marketing evidence.
  # Uses Wikimedia public read APIs; set a descriptive User-Agent per API etiquette.
  enabled: true
  user_agent: "ARGUS-VLM/0.1 (local-first ad classifier; https://github.com/LordLoras/ARGUS_vlm)"
  timeout_s: 10
  cache_days: 90
  max_candidates: 5
  # Follow parent/owner Wikidata claims this many hops for corporate-chain context.
  max_parent_depth: 3

api:
  # FastAPI bind address. 127.0.0.1 keeps the API local-only.
  host: 127.0.0.1
  port: 8000
  # Browser CORS allowlist for split-origin deployments. In normal Vite dev
  # mode, the frontend uses same-origin /api and /data proxying, so random
  # tunnel URLs do not need to be added here.
  cors_origins:
    - http://localhost:5173
  upload:
    max_bytes: 209715200          # 200 MB
    allowed_mime:
      - video/mp4
      - video/quicktime
      - video/webm

worker:
  # Polling interval for queued jobs. Lower reacts faster; higher is quieter.
  poll_interval_ms: 1000
  # Pipeline concurrency. Keep 1 for local GPU/VLM stability.
  concurrency: 1

agent:
  # inherit_vlm: true (default) lets the agent reuse a VLM endpoint preset.
  # inherit_vlm_mode chooses which preset: active follows vlm.mode; local,
  # remote, and frontier pin the agent to that preset while ingest can use
  # a different VLM mode.
  inherit_vlm: true
  inherit_vlm_mode: active      # active | local | remote | frontier
  # endpoint: leave {} to inherit from vlm when inherit_vlm is true. Fill
  # endpoint/model/api_key_env here only to pin the agent to a different model.
  endpoint: {}
  # max_iterations limits tool-call loops for one agent answer.
  max_iterations: 8
  list_max_rows: 50
  sql_readonly_max_rows: 50
  sql_statement_timeout_s: 5
  temperature: 0.1
  max_tokens: 1024

creative_panel:
  # Creative Panel and Debate are user-triggered synthetic analysis calls.
  # Keep inherit_vlm: true for old behavior. Set false and fill endpoint to
  # keep these calls local/remote while ingest uses a Frontier model.
  inherit_vlm: true
  endpoint: {}
  temperature: 0.1
  max_tokens: 8192

search:
  # Minimum cosine-similarity threshold for vector search results.
  # Results below these scores are dropped before ranking/filtering.
  # Lower values = more recall, higher values = more precision.
  # Set to 0 to disable relevance filtering entirely.
  # SigLIP2 cross-modal (text→image) cosine similarities cluster close
  # to zero on local video frames, and ad-level visual vectors are
  # mean-pooled from keyframes (diluting the signal), so the visual
  # threshold must be much more permissive than text-vector search.
  # For visual mode, the filter also checks
  # per-frame similarity (picking the best keyframe), not just the
  # ad-level vector, so an ad survives if ANY keyframe clears the bar.
  text_min_score: 0.20          # text-vector (all-MiniLM-L6-v2) and hybrid mode
  visual_min_score: 0.03        # visual-only / exploratory SigLIP2 queries
  visual_hybrid_min_score: 0.08 # visual-only additions when keyword hits exist
