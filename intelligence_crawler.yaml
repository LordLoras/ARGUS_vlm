# Intelligence crawler configuration (US market only).
#
# Brand-anchored awareness crawler: detects when a watched US brand publishes a new
# ad/campaign. Separate from entity_crawler.yaml. All sources are DISABLED by default,
# so an unconfigured install is a no-op. Secrets (API keys) go in .env.local and are
# referenced here by env-var NAME only — never paste secrets into this file.

enabled: true
db_path: ./intelligence_crawler.db
cache_dir: ./data/intelligence_crawler_cache
market: US

http:
  respect_robots_txt: true
  timeout_s: 12.0
  rate_limit_per_minute: 20
  max_page_bytes: 2000000
  user_agent: "ARGUS-IntelligenceCrawler/0.1 (+local analyst tool)"

detection:
  # Newly-seen items older than this (by publish date) are recorded as backfill, not
  # emitted as live "new ad" signals. The first poll of any source is always baseline.
  new_signal_lookback_days: 30
  stale_after_days: 45

scoring:
  tier_weights: {A: 0.55, B: 0.35, C: 0.15}
  ad_likeness_bonus: 0.15
  corroboration_bonus: 0.2
  corroboration_cap: 0.4
  corroborated_min_confidence: 0.7

watchlist:
  # Watchlist = entity-graph brand nodes (read-only) UNION the seed list below.
  include_graph_brands: true
  entity_graph_db_path: ./entity_graph.db
  seed_brands:
    - Toyota
    - Ford
    - Jeep
    - Apple
    - McDonald's
    - GEICO
    - DoorDash
    - Duolingo
    - Samsung
    - Starbucks

sources:
  # --- Real adapters ------------------------------------------------------------
  # Ten diversified US-market brands with the same two disabled adapters each:
  # Meta Ad Library (public page id) + Google Ads Transparency Center (US advertiser id).
  # Keep disabled by default; enable/run from the Watcher UI when you want to poll.
  # Meta page ids were smoke-tested against active US Ad Library cards on 2026-07-01.
  # ATC ids were verified with LookupService/GetAdvertiserById as region=US on 2026-07-01.
  - id: toyota_atc
    brand: Toyota
    source_type: google_atc
    tier: B
    enabled: false
    platform: google
    platform_id: "AR11569656475307474945"
    poll_interval_hours: 24
    notes: "ATC lookup: TOYOTA MOTOR NORTH AMERICA INC, US; selected for video creatives."
    config: &atc_us_config
      page_size: 40
      max_pages: 10
      preview_enrichment: true
      # Video is the primary target: enrich every video/hosted creative in a poll
      # (a max_pages=10 crawl fetches up to 400 creatives). Image creatives carry no
      # preview_url, so they don't consume this budget.
      preview_enrichment_limit: 400

  - id: jeep_atc
    brand: Jeep
    source_type: google_atc
    tier: B
    enabled: false
    platform: google
    platform_id: "AR18054808035703914497"
    poll_interval_hours: 24
    notes: "ATC lookup: FCA US LLC, US; brand owner/advertiser for Jeep."
    config:
      <<: *atc_us_config
      resolve_names: ["FCA US LLC", "Stellantis North America"]

  - id: ford_atc
    brand: Ford
    source_type: google_atc
    tier: B
    enabled: false
    platform: google
    platform_id: "AR15898411213873217537"
    poll_interval_hours: 24
    notes: "ATC lookup: Ford Motor Company, US; selected for image creatives."
    config:
      <<: *atc_us_config
      resolve_names: ["Ford Motor Company"]

  - id: apple_meta_ads
    brand: Apple
    source_type: meta_ad_library_ui
    tier: B
    enabled: false
    platform: meta
    platform_id: "434174436675167"
    poll_interval_hours: 24
    notes: "Apple Meta page id; active cards smoke-tested with US filter."
    config: &meta_active_config
      active_status: active
      sort_mode: relevancy_monthly_grouped
      sort_direction: desc
      scrolls: 20
      max_cards: 250
      wait_ms: 1800
      stop_after_no_new: 3

  - id: apple_atc
    brand: Apple
