    poll_interval_hours: 24
    notes: "ATC lookup: Apple Inc., US; selected for image/video creatives."
    config:
      <<: *atc_us_config
      resolve_names: ["Apple Inc", "Apple Inc."]

  - id: mcdonalds_meta_ads
